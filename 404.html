<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LC Generator - Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect: redirect any 404 path back to the site root
    // This handles direct navigation to non-existent paths on GitHub Pages
    (function() {
      var path = window.location.pathname;
      // Get the repository root (first 2 segments: '' and 'reponame')
      var segments = path.split('/');
      var repoRoot = segments.slice(0, 2).join('/') + '/';

      // Build the redirect URL back to the app root
      var redirectUrl = window.location.protocol + '//' + window.location.host + repoRoot;

      // Preserve hash and search params
      if (window.location.search) {
        redirectUrl += window.location.search;
      }
      if (window.location.hash) {
        redirectUrl += window.location.hash;
      }

      window.location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
